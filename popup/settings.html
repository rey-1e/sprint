<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sprint - Extension Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="brand">
      <span class="ext-name">Sprint <span>Settings.</span></span>
    </div>
    <div>
      <a href="popup.html" class="website-link" style="font-size: 11px; font-weight: 600;">&larr; Back</a>
    </div>
  </header>

  <main>
    <div class="section">
      <p class="section-label">Global Core Settings</p>
      <div class="shortcut-group">
        <div class="shortcut-row flex-row-align">
          <span class="shortcut-label">Show Floating Sphere</span>
          <label class="sprint-switch">
            <input type="checkbox" id="showSphere">
            <span class="sprint-slider"></span>
          </label>
        </div>
        <div class="shortcut-row flex-row-align">
          <span class="shortcut-label">Remove Javascript Injections</span>
          <label class="sprint-switch">
            <input type="checkbox" id="removeInjections">
            <span class="sprint-slider"></span>
          </label>
        </div>
        <div class="shortcut-row flex-row-align">
          <span class="shortcut-label">Disable Selection Popup</span>
          <label class="sprint-switch">
            <input type="checkbox" id="removeSelectionPopup">
            <span class="sprint-slider"></span>
          </label>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div style="font-size: 11px; color: var(--ink-muted); text-align: center;">
      LeetCode Sprint Settings &bull; Live production profile
    </div>
  </footer>

  <script src="settings.js"></script>
</body>
</html>
